<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SHC - Shahid Healthcare Gym Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0a0000, #1a0000, #0f0000);
      background-size: 400% 400%;
      animation: bgPulse 8s ease infinite;
      color: white;
      overflow: hidden;
    }

    @keyframes bgPulse {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating particles */
    .particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #ff2222;
      border-radius: 50%;
      opacity: 0;
      animation: floatUp var(--dur) linear var(--delay) infinite;
    }

    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.2; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    /* Box entrance */
    .login-box {
      position: relative;
      z-index: 1;
      width: 360px;
      padding: 35px 30px;
      border-radius: 20px;
      background: rgba(20, 0, 0, 0.85);
      box-shadow:
        0 0 30px rgba(255, 0, 0, 0.35),
        0 0 60px rgba(255, 0, 0, 0.15),
        inset 0 0 30px rgba(255,0,0,0.05);
      text-align: center;
      border: 1px solid rgba(255, 60, 60, 0.2);
      animation: boxEntrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      backdrop-filter: blur(10px);
    }

    @keyframes boxEntrance {
      from { opacity: 0; transform: translateY(40px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Glowing border animation */
    .login-box::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 20px;
      background: linear-gradient(45deg, #ff0000, transparent, #cc0000, transparent, #ff0000);
      background-size: 300% 300%;
      animation: borderGlow 4s linear infinite;
      z-index: -1;
      opacity: 0.5;
    }

    @keyframes borderGlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Logo */
    .logo-icon {
      font-size: 42px;
      animation: heartbeat 1.5s ease infinite;
      display: block;
      margin-bottom: 6px;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%       { transform: scale(1.15); }
      28%       { transform: scale(1); }
      42%       { transform: scale(1.1); }
      56%       { transform: scale(1); }
    }

    .login-box h1 {
      font-size: 30px;
      margin-bottom: 6px;
      color: #ff3333;
      text-shadow: 0 0 10px rgba(255,50,50,0.8), 0 0 20px rgba(255,0,0,0.4);
      animation: titleGlow 2s ease-in-out infinite alternate;
      letter-spacing: 3px;
    }

    @keyframes titleGlow {
      from { text-shadow: 0 0 8px rgba(255,50,50,0.6), 0 0 16px rgba(255,0,0,0.3); }
      to   { text-shadow: 0 0 16px rgba(255,80,80,1), 0 0 32px rgba(255,0,0,0.6); }
    }

    .login-box p {
      color: #cc6666;
      margin-bottom: 28px;
      font-size: 13px;
      letter-spacing: 1px;
      animation: fadeSlideIn 0.8s ease 0.3s both;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Input fields */
    .input-box {
      margin-bottom: 16px;
      position: relative;
      animation: fadeSlideIn 0.8s ease var(--delay, 0.4s) both;
    }

    .input-box:nth-child(1) { --delay: 0.4s; }
    .input-box:nth-child(2) { --delay: 0.55s; }

    .input-box input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(255, 60, 60, 0.2);
      outline: none;
      border-radius: 10px;
      background: rgba(40, 5, 5, 0.8);
      color: white;
      font-size: 15px;
      transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
    }

    .input-box input::placeholder {
      color: #884444;
    }

    .input-box input:focus {
      border-color: #ff3333;
      background: rgba(60, 5, 5, 0.9);
      box-shadow: 0 0 12px rgba(255, 0, 0, 0.35), inset 0 0 8px rgba(255,0,0,0.1);
    }

    /* Button */
    .login-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #cc0000, #ff3333);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: 2px;
      position: relative;
      overflow: hidden;
      animation: fadeSlideIn 0.8s ease 0.7s both;
      box-shadow: 0 4px 20px rgba(255, 0, 0, 0.4);
    }

    /* Shimmer effect on button */
    .login-btn::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -75%;
      width: 50%;
      height: 200%;
      background: rgba(255,255,255,0.15);
      transform: skewX(-20deg);
      animation: shimmer 3s ease infinite;
    }

    @keyframes shimmer {
      0%   { left: -75%; }
      60%  { left: 130%; }
      100% { left: 130%; }
    }

    .login-btn:hover {
      transform: scale(1.04) translateY(-1px);
      box-shadow: 0 6px 28px rgba(255, 0, 0, 0.6);
    }

    .login-btn:active {
      transform: scale(0.98);
    }

    /* Message */
    #message {
      margin-top: 14px;
      font-size: 13px;
      min-height: 18px;
      animation: fadeSlideIn 0.4s ease both;
    }

    #message.error { color: #ff6666; }
    #message.success { color: #66ff88; }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,60,60,0.3), transparent);
      margin: 20px 0;
    }
  </style>
</head>

<body>

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <div class="login-box">
    <span class="logo-icon">🏋️</span>
    <h1>SHC GYM</h1>
    <p>Shahid Healthcare Gym Login</p>

    <div class="divider"></div>

    <div class="input-box">
      <input type="text" id="username" placeholder="Enter Your Name" autocomplete="off">
    </div>

    <div class="input-box">
      <input type="password" id="code" placeholder="Enter Secret Code">
    </div>

    <button class="login-btn" onclick="loginUser()">⚡ LOGIN</button>

    <div id="message"></div>
  </div>

  <script>
    // Generate floating particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.setProperty('--dur', (4 + Math.random() * 8) + 's');
      p.style.setProperty('--delay', (Math.random() * 8) + 's');
      p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
      container.appendChild(p);
    }

    // Placeholder login function (replace with your code.js logic)
    function loginUser() {
      const username = document.getElementById('username').value.trim();
      const code = document.getElementById('code').value.trim();
      const msg = document.getElementById('message');

      if (!username || !code) {
        msg.className = 'error';
        msg.textContent = '⚠️ Please fill in all fields.';
        return;
      }

      msg.className = '';
      msg.textContent = 'Authenticating...';
    }
  </script>

  <!-- Your original logic -->
  <script src="code.js"></script>

</body>
</html>
